<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모 + 무드보드 (연결형)</title>
  <meta name="google-adsense-account" content="ca-pub-2923239501866689">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2923239501866689" crossorigin="anonymous"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BBCYP4BBRY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BBCYP4BBRY');
  </script>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>

<div id="left">
  <button class="action-btn" onclick="addNote()">+ 메모 추가</button>
  <div id="notes"></div>

  <!-- Footer Section: Contact & Comments -->
  <div class="footer-content">
    <h3>제휴 문의</h3>
    <form action="https://formspree.io/f/mvzvjkrp" method="POST" id="contact-form">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" required placeholder="홍길동 / (주)옐로스">
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="3" required placeholder="내용을 입력해주세요."></textarea>
      </div>
      <button type="submit" class="submit-btn">문의하기</button>
    </form>

    <div id="disqus_thread"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://yelloce-memo.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
  </div>
</div>

<div id="resizer"></div>

<div id="right"></div>

<script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
