<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모 + 무드보드 (연결형)</title>
  <meta name="google-adsense-account" content="ca-pub-2923239501866689">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2923239501866689" crossorigin="anonymous"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BBCYP4BBRY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BBCYP4BBRY');
  </script>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>

<div id="left">
  <!-- 상단: 메모 추가 컨트롤 -->
  <div class="memo-controls">
    <button class="action-btn" onclick="addNote()">+ 새로운 메모 추가</button>
  </div>

  <!-- 중간: 메모 작성 리스트 (자동 스크롤) -->
  <div id="notes-container">
    <div id="notes"></div>
  </div>

  <!-- 하단: 제휴 문의 및 댓글 -->
  <div class="footer-section">
    <h3>제휴 문의</h3>
    <form action="https://formspree.io/f/mvzvjkrp" method="POST" id="contact-form">
      <div class="form-group">
        <input type="text" name="name" required placeholder="성함/업체명">
      </div>
      <div class="form-group">
        <input type="email" name="_replyto" required placeholder="이메일">
      </div>
      <div class="form-group">
        <textarea name="message" rows="2" required placeholder="문의 내용"></textarea>
      </div>
      <button type="submit" class="submit-btn">문의하기</button>
    </form>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

    <div id="disqus_thread"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://yelloce-memo.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
  </div>
</div>

<div id="resizer"></div>

<div id="right"></div>

<script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
